<div>
  <div class="mb-6">
    <a class="back-link text-purple-300 text-lg font-medium cursor-pointer" (click)="goBack()">
      <span class="text-2xl">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
          class="w-5 h-5"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M15 19l-7-7 7-7"
          /></svg></span>
      <span class="back-link-text">Back to Prompts</span>
    </a>
  </div>
  <h2 class="text-4xl font-bold text-gray-100 mb-2">Create Prompt</h2>
  <p class="text-xl text-gray-400 mb-10">Add a new prompt to the collection</p>
  <div class="w-full max-w-3xl mx-auto">
    <form
      (ngSubmit)="createPrompt()"
      #promptForm="ngForm"
      autocomplete="off"
      class="bg-[#232b3a]/80 border border-[#38405a] rounded-xl px-12 py-10 shadow-lg"
    >
      <div class="mb-7">
        <label class="block text-lg text-gray-200 mb-2 font-semibold">Title</label>
        <input
          type="text"
          name="title"
          [(ngModel)]="title"
          required
          minlength="3"
          class="w-full bg-transparent border border-[#38405a] rounded-lg px-5 py-3 text-white text-lg focus:outline-none focus:border-purple-500 placeholder-gray-400"
          placeholder="Enter prompt title"
        />
        <div class="text-sm text-gray-500 mt-1">Minimum 3 characters</div>
      </div>
      <div class="mb-7">
        <label class="block text-lg text-gray-200 mb-2 font-semibold">Content</label>
        <textarea
          name="content"
          [(ngModel)]="content"
          required
          minlength="20"
          rows="4"
          class="w-full bg-transparent border border-[#38405a] rounded-lg px-5 py-3 text-white text-lg focus:outline-none focus:border-purple-500 placeholder-gray-400"
          placeholder="Write your prompt here..."
        ></textarea>
        <div class="text-sm text-gray-500 mt-1">Minimum 20 characters</div>
      </div>
      <div class="mb-10">
        <label class="block text-lg text-gray-200 mb-2 font-semibold">Complexity</label>
        <div class="relative">
          <select
            name="complexity"
            [(ngModel)]="complexity"
            class="w-full bg-transparent border border-[#38405a] rounded-lg px-5 py-3 text-white text-lg focus:outline-none focus:border-purple-500 pr-10"
          >
            <option value="1">1 - Easy</option>
            <option value="2">2 - Easy</option>
            <option value="3">3 - Easy</option>
            <option value="4">4 - Easy</option>
            <option value="5">5 - Medium</option>
            <option value="6">6 - Medium</option>
            <option value="7">7 - Medium</option>
            <option value="8">8 - Hard</option>
            <option value="9">9 - Hard</option>
            <option value="10">10 - Hard</option>
          </select>
          <span
            class="select-arrow pointer-events-none absolute right-4 top-1/2 -translate-y-1/2 text-gray-400"
          >
            <svg width="20" height="20" fill="none" viewBox="0 0 20 20">
              <path
                d="M6 8l4 4 4-4"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
          </span>
        </div>
        <div class="text-sm text-gray-500 mt-1">Select a value from 1 (Easy) to 10 (Hard)</div>
      </div>
      <div class="flex justify-end">
        <button
          type="submit"
          [disabled]="promptForm.invalid"
          class="bg-[#a259f7] hover:bg-[#7c3aed] text-white px-8 py-3 rounded-lg font-semibold text-lg shadow disabled:opacity-50"
        >
          Create Prompt
        </button>
      </div>
    </form>
  </div>
</div>
