<ng-container *ngIf="prompt$ | async as prompt; else loadingTpl">
    <div class="mb-6">
     <a class="back-link text-purple-300 text-lg font-medium cursor-pointer" (click)="goBack()">
      <span class="text-2xl">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
          class="w-5 h-5"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M15 19l-7-7 7-7"
          /></svg></span>
      <span class="back-link-text">Back to Prompts</span>
    </a>
    </div>

  <div class="bg-[#232b3a]/80 border border-[#38405a] rounded-xl px-12 py-10 shadow-lg">

    <!-- Title + Complexity -->
    <div class="flex items-center justify-between mb-8">
      <div class="text-3xl font-bold text-white">
        {{ prompt.title }}
      </div>

      <div class="flex items-center gap-2">
        <span
          class="complexity-badge px-3 py-1 rounded font-semibold"
          [ngClass]="getComplexityColor(prompt.complexity)"
        >
          {{ getComplexityLabel(prompt.complexity) }}
        </span>

        <span
          class="complexity-badge px-3 py-1 rounded font-semibold"
          [ngClass]="getComplexityColor(prompt.complexity)"
        >
          {{ prompt.complexity }}
        </span>
      </div>
    </div>

    <!-- Content -->
    <div class="mb-8">
      <div class="text-lg text-gray-300">
        {{ prompt.content }}
      </div>
    </div>

    <hr class="border-[#38405a] mb-8">

    <!-- Views -->
    <div>
      <div class="text-lg text-white font-semibold mb-2">Views</div>
      <div class="text-lg text-gray-100 border border-[#38405a] rounded-lg px-5 py-3 inline-block">
        {{ prompt.view_count || 0 }}
      </div>
    </div>

  </div>

</ng-container>

<ng-template #loadingTpl>
  <div class="text-gray-300">Loading...</div>
</ng-template>
