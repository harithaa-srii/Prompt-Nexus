<div class="min-h-screen flex flex-col bg-slate-900">
	<!-- Header -->
	<header class="w-full px-8 pt-8 pb-2 flex flex-col items-center">
		<div class="w-full max-w-5xl flex items-center justify-between">
			<div class="flex items-center gap-2">
                
				<span class="text-2xl font-bold text-purple-300" style="letter-spacing: -1px;">Prompt Nexus</span>
			</div>
			<nav class="flex gap-8 items-center">
				<a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }" class="nav-link">Prompts</a>
				<a routerLink="/create" routerLinkActive="active" class="nav-link">Create</a>
			</nav>
		</div>
		<div class="w-full max-w-5xl border-b border-slate-700 mt-4"></div>
	</header>

	<!-- Main Content -->
	<main class="flex-1 w-full max-w-5xl mx-auto px-8 pt-8">
		<router-outlet></router-outlet>
	</main>

	<!-- Footer -->
	<footer class="w-full text-center text-gray-500 text-xs py-6 border-t border-slate-800 mt-8">
		© 2024 Prompt Nexus. All rights reserved.
	</footer>
</div>
