version: '3.9'

services:

  db:
    image: postgres:15
    container_name: prompt_db
    restart: always
    environment:
      POSTGRES_DB: promptdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: prompt_redis
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    container_name: prompt_backend
    restart: always
    command: >
      sh -c "sleep 5 &&
             python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    environment:
      USE_POSTGRES: "True"
      POSTGRES_DB: promptdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      REDIS_HOST: redis
      PYTHONUNBUFFERED: 1

volumes:
  postgres_data: